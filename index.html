<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ID MASTER PLATINUM V12</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div id="screen-input" class="app-screen active scrollable">
        <div class="glass-container">
            <header class="main-header">
                <div class="logo-badge">H A</div>
                <h1> مجموعة هكر <span>☠️"أبو يمان "☠️</span></h1>
            </header>

            <div class="neo-form">
                <div class="input-group">
                    <label>رقم الهوية</label>
                    <input type="text" id="in-id-num" class="save-me" placeholder="000 000 000">
                </div>

                <div class="grid-inputs">
                    <div class="field-pair"><input type="text" id="in-name-ar" class="save-me" placeholder="الاسم (Ar)"><input type="text" id="in-name-he" class="save-me" placeholder="שם" dir="ltr"></div>
                    <div class="field-pair"><input type="text" id="in-father-ar" class="save-me" placeholder="اسم الأب (Ar)"><input type="text" id="in-father-he" class="save-me" placeholder="שם אב" dir="ltr"></div>
                    <div class="field-pair"><input type="text" id="in-grand-ar" class="save-me" placeholder="اسم الجد (Ar)"><input type="text" id="in-grand-he" class="save-me" placeholder="שם סב" dir="ltr"></div>
                    <div class="field-pair"><input type="text" id="in-family-ar" class="save-me" placeholder="اسم العائلة (Ar)"><input type="text" id="in-family-he" class="save-me" placeholder="שם משפחה" dir="ltr"></div>
                    <div class="field-pair"><input type="text" id="in-mother-ar" class="save-me" placeholder="اسم الأم (Ar)"><input type="text" id="in-mother-he" class="save-me" placeholder="שם אם" dir="ltr"></div>
                    
                    <div class="divider"><span>الولادة</span></div>
                    <div class="field-pair"><input type="text" id="in-pob-ar" class="save-me" placeholder="مكان الولادة (Ar)"><input type="text" id="in-pob-he" class="save-me" placeholder="מקום לידה" dir="ltr"></div>
                    
                    <div class="divider"><span>الإصدار والحالة</span></div>
                    <div class="field-pair"><input type="text" id="in-iss-ar" class="save-me" placeholder="مكان الإصدار (Ar)"><input type="text" id="in-iss-he" class="save-me" placeholder="מקום הוצאה" dir="ltr"></div>
                    <div class="field-pair"><input type="text" id="in-status-ar" class="save-me" placeholder="الحالة (Ar)"><input type="text" id="in-status-he" class="save-me" placeholder="סטטוס" dir="ltr"></div>
                    
                    <div class="divider"><span>الجنس والديانة</span></div>
                    <div class="field-pair"><input type="text" id="in-sex-ar" class="save-me" placeholder="الجنس (Ar)"><input type="text" id="in-sex-he" class="save-me" placeholder="מין" dir="ltr"></div>
                    <div class="field-pair"><input type="text" id="in-rel-ar" class="save-me" placeholder="الديانة (Ar)"><input type="text" id="in-rel-he" class="save-me" placeholder="דת" dir="ltr"></div>
                    
                    <div class="divider"><span>القياسات</span></div>
                    <div class="field-pair"><input type="text" id="in-height" class="save-me" placeholder="الطول (Height)"><input type="text" id="in-weight" class="save-me" placeholder="الوزن (Weight)" dir="ltr"></div>
                </div>

                <div class="date-row-neo">
                    <div class="date-item">
                        <label>الميلاد (ي/ش/س)</label>
                        <div class="d-inputs"><input type="number" id="dob-d" class="save-me" placeholder="ي"><input type="number" id="dob-m" class="save-me" placeholder="ش"><input type="number" id="dob-y" class="save-me" placeholder="س"></div>
                    </div>
                    <div class="date-item">
                        <label>الإصدار (ي/ش/س)</label>
                        <div class="d-inputs"><input type="number" id="iss-d" class="save-me" placeholder="ي"><input type="number" id="iss-m" class="save-me" placeholder="ش"><input type="number" id="iss-y" class="save-me" placeholder="س"></div>
                    </div>
                </div>

                <button class="btn-primary" onclick="processAndShow()">المعاينة والتحرير الذكي ⚡</button>
                <div class="secondary-btns">
                    <button class="btn-glass" onclick="document.getElementById('in-photo').click()">📸 صورة الشخص</button>
                    <button class="btn-danger-icon" onclick="clearAllData()">🗑️</button>
                </div>
            </div>
            <input type="file" id="in-photo" hidden accept="image/*">
            <div style="height: 100px;"></div>
        </div>
    </div>

    <div id="screen-preview" class="app-screen">
        <nav class="top-nav">
            <button class="btn-back" onclick="goBack()">↩ رجوع</button>
            <div class="nav-title">نقر مزدوج = عرض كامل 📱</div>
            <button class="btn-save" id="btn-save">حفظ PNG 📥</button>
        </nav>

        <div class="editor-workspace" id="scroll-container">
            <div id="capture-area" class="id-card-canvas">
                <div class="photo-frame"><img id="out-photo"></div>
                <div id="stamp-obj" class="selectable stamp-element" data-id="stamp"><img src="https://i.imgur.com/0zhyOvQ.png"></div>
                <div id="out-id-num" class="selectable id-number-text" data-id="id-num"></div>
                
                <div id="row-1" class="selectable field-row r1" data-id="r1"><span class="ar"></span><span class="he"></span></div>
                <div id="row-2" class="selectable field-row r2" data-id="r2"><span class="ar"></span><span class="he"></span></div>
                <div id="row-3" class="selectable field-row r3" data-id="r3"><span class="ar"></span><span class="he"></span></div>
                <div id="row-4" class="selectable field-row r4" data-id="r4"><span class="ar"></span><span class="he"></span></div>
                <div id="row-5" class="selectable field-row r5" data-id="r5"><span class="ar"></span><span class="he"></span></div>
                <div id="row-6" class="selectable field-row r6" data-id="r6"><span class="ar"></span><span class="he"></span></div>
                <div id="row-sex" class="selectable field-row r-sex" data-id="r-sex"><span class="ar"></span><span class="he"></span></div>
                <div id="row-7" class="selectable field-row r7" data-id="r7"><span class="ar"></span><span class="he"></span></div>
                <div id="row-iss-p" class="selectable field-row r-iss-p" data-id="r-iss-p"><span class="ar"></span><span class="he"></span></div>
                <div id="row-status" class="selectable field-row r-status" data-id="r-status"><span class="ar"></span><span class="he"></span></div>
                <div id="row-measurements" class="selectable field-row r-measurements" data-id="r-measurements"><span class="ar"></span><span class="he"></span></div>
                
                <div id="out-dob-display" class="selectable dob-text" data-id="dob"></div>
                <div id="out-iss-display" class="selectable iss-text" data-id="iss"></div>
                <div id="noise-layer" class="noise-overlay"></div>
            </div>
        </div>

        <div class="floating-controls">
            <div class="tools-scroll">
                <div class="tool-card">
                    <label>التحريك</label>
                    <div class="dpad-controller">
                        <button onclick="move('up')">▲</button>
                        <div class="mid-dpad">
                            <button onclick="move('left')">◀</button>
                            <button onclick="move('right')">▶</button>
                        </div>
                        <button onclick="move('down')">▼</button>
                    </div>
                </div>
                <div class="tool-card">
                    <label>الحجم والدوران</label>
                    <div class="btn-group">
                        <button onclick="changeSize(1.02)">➕</button>
                        <button onclick="changeSize(0.98)">➖</button>
                        <button onclick="rotateItem(2)">↻</button>
                        <button onclick="rotateItem(-2)">↺</button>
                    </div>
                </div>
                <div class="tool-card">
                    <label>الخط والواقعية</label>
                    <div class="btn-group">
                        <button onclick="changeWeight(100)"><b>B+</b></button>
                        <button onclick="changeWeight(-100)">B-</button>
                    </div>
                    <input type="range" min="0" max="15" step="0.5" value="0" oninput="applyDeepInk(this.value)">
                </div>
                <div class="tool-card">
                    <label>مؤثرات</label>
                    <div class="btn-group">
                        <button onclick="applyNoise()">🎞️</button>
                        <button onclick="makeUltraRealistic()" class="btn-gold">👑</button>
                        <button onclick="adjustHebrewOffset(2)">➡ Heb</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
